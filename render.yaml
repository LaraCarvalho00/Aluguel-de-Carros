services:
  - type: web
    name: aluguel-carros-api
    runtime: java
    buildCommand: "./mvnw package -DskipTests"
    startCommand: "java -jar target/aluguel-de-carros-0.1.0.jar"
    envVars:
      - key: URL_BD
        sync: false
      - key: USER_BD
        sync: false
      - key: PASSWORD_BD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    name: aluguel-carros-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
