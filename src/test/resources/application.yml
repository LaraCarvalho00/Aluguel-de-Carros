seed:
  usuarios-demo:
    enabled: false

micronaut:
  application:
    name: aluguel-de-carros-test
  server:
    port: -1
  security:
    enabled: false

datasources:
  default:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
    dialect: H2

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create-drop
        show_sql: true
