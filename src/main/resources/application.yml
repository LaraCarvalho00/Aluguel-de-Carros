micronaut:
  application:
    name: aluguel-de-carros
  server:
    port: 8080
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**

datasources:
  default:
    url: ${URL_BD:jdbc:postgresql://localhost:5433/mydatabase}
    driverClassName: org.postgresql.Driver
    username: ${USER_BD:postgres}
    password: ${PASSWORD_BD:1234567}
    dialect: POSTGRESQL

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
