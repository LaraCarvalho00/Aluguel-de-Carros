seed:
  usuarios-demo:
    # Cria/atualiza ADMIN, AGENTE e CLIENTE de demonstração (CPFs e nomes alinhados ao README). Desative em produção se não desejar.
    enabled: true

micronaut:
  application:
    name: aluguel-de-carros
  server:
    port: ${PORT:8080}
    cors:
      enabled: true
      configurations:
        web:
          allowedOrigins:
            - http://localhost:3000
            - http://localhost:3001
            - http://127.0.0.1:3000
            - http://127.0.0.1:3001
          allowedMethods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          allowedHeaders:
            - Content-Type
            - Authorization
  security:
    enabled: true
    authentication: bearer
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "${JWT_SECRET:AluguelCarrosSecretKeyPUCMinas2024SuperLonga!!}"
        generator:
          access-token:
            expiration: 86400
    endpoints:
      login:
        enabled: true
        path: /api/v1/auth/login
      logout:
        enabled: false
    intercept-url-map:
      - pattern: /swagger-ui/**
        access:
          - isAnonymous()
      - pattern: /swagger/**
        access:
          - isAnonymous()
      - pattern: /api/v1/auth/registro
        http-method: POST
        access:
          - isAnonymous()
  router:
    static-resources:
      swagger:
        paths: classpath:META-INF/swagger
        mapping: /swagger/**
      swagger-ui:
        paths: classpath:META-INF/swagger/views/swagger-ui
        mapping: /swagger-ui/**

datasources:
  default:
    url: ${URL_BD}
    driverClassName: org.postgresql.Driver
    username: ${USER_BD}
    password: ${PASSWORD_BD}
    dialect: POSTGRESQL

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: update
        show_sql: false
